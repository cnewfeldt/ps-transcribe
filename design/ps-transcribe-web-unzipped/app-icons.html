<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PS Transcribe — App Icon v3 · Bot in the Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<style>
  body { background: #f0eee9; }

  /* Shared squircle */
  .sq {
    width: 240px; height: 240px;
    border-radius: 54px;
    display: block; overflow: hidden; position: relative;
    background: var(--paper-warm);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 0 0 0.5px rgba(30,30,28,0.10),
      0 18px 36px rgba(30,30,28,0.18),
      0 2px 6px rgba(30,30,28,0.08);
  }

  /* ─── 04 · KEEPER — chip with waveform ─── */
  .c04 { background: radial-gradient(120% 80% at 50% 10%, #FFFEF9 0%, var(--paper-warm) 60%, var(--paper-soft) 100%); }
  .c04 .chip {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 136px; height: 136px; border-radius: 28px;
    background: var(--ink);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 8px 20px rgba(30,30,28,0.28);
  }
  .c04 .pins { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 190px; height: 190px; pointer-events: none; }
  .c04 .pins span { position: absolute; background: var(--ink-muted); border-radius: 1px; }
  .c04 .pins .top { top: 0; width: 4px; height: 22px; }
  .c04 .pins .bot { bottom: 0; width: 4px; height: 22px; }
  .c04 .pins .left { left: 0; width: 22px; height: 4px; }
  .c04 .pins .right { right: 0; width: 22px; height: 4px; }
  .c04 .wave { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 96px; height: 60px; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .c04 .wave span { width: 4px; border-radius: 2px; background: var(--paper); }

  /* ─── 10 · KEEPER — chip package with signal trace ─── */
  .c10 { background: radial-gradient(120% 80% at 50% 10%, var(--paper) 0%, var(--paper-soft) 100%); }
  .c10 .package {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 164px; height: 116px; border-radius: 14px;
    background: var(--ink);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 10px 22px rgba(30,30,28,0.24);
  }
  .c10 .package::before { content: ""; position: absolute; inset: 10px; border-radius: 8px; background: #131311; box-shadow: 0 0 0 0.5px rgba(255,255,255,0.06) inset; }
  .c10 .leads { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 220px; height: 116px; pointer-events: none; }
  .c10 .leads span { position: absolute; background: var(--ink-muted); border-radius: 1px; opacity: 0.8; height: 4px; width: 18px; }
  .c10 .leads span.l { left: 0; } .c10 .leads span.r { right: 0; }
  .c10 .leads span.y1 { top: 18px; } .c10 .leads span.y2 { top: 42px; } .c10 .leads span.y3 { top: 66px; } .c10 .leads span.y4 { top: 90px; }
  .c10 .wave-svg { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 140px; height: 80px; }

  /* ═══════════════════════════════════════════════════════════
     BOT-IN-COMPUTER FAMILY
     ═══════════════════════════════════════════════════════════ */

  /* ─── 12 · Mac Plus silhouette with a bot face ─── */
  /* Classic beige-Mac silhouette in ink, screen is a friendly bot face.
     Most literal of the four. "A little transcription companion that
     lives in your Mac." */
  .c12 { background: var(--paper-warm); }
  .c12 .mac {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 144px; height: 168px;
    background: var(--ink);
    border-radius: 14px 14px 18px 18px;
    box-shadow: 0 10px 22px rgba(30,30,28,0.26);
  }
  .c12 .mac::after {
    /* drive slot */
    content: "";
    position: absolute; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 3px;
    background: rgba(250,250,247,0.4);
    border-radius: 2px;
  }
  .c12 .screen {
    position: absolute;
    left: 50%; top: 40%;
    transform: translate(-50%, -50%);
    width: 108px; height: 84px;
    border-radius: 8px;
    background: var(--accent-ink);
    overflow: hidden;
    box-shadow: 0 0 0 2px var(--ink) inset, 0 0 0 3px rgba(255,255,255,0.12) inset;
  }
  .c12 .eye {
    position: absolute; top: 30px;
    width: 12px; height: 18px;
    border-radius: 6px;
    background: var(--paper);
  }
  .c12 .eye.l { left: 28px; }
  .c12 .eye.r { right: 28px; }
  .c12 .smile {
    position: absolute;
    left: 50%; bottom: 18px;
    transform: translateX(-50%);
    width: 40px; height: 16px;
    border: 0 solid var(--paper);
    border-bottom-width: 3px;
    border-radius: 0 0 30px 30px;
  }

  /* ─── 13 · Speech-bubble bot ─── */
  /* A round-headed robot with a serif T on its forehead, sitting
     inside a speech bubble. "The AI speaks (or listens)." */
  .c13 { background: var(--paper); }
  .c13 .bubble {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -52%);
    width: 172px; height: 138px;
    background: var(--paper-warm);
    border: 0.5px solid rgba(30,30,28,0.14);
    border-radius: 24px;
    box-shadow: 0 10px 22px rgba(30,30,28,0.10);
  }
  .c13 .bubble::after {
    /* tail */
    content: "";
    position: absolute;
    left: 36px; bottom: -14px;
    width: 24px; height: 24px;
    background: var(--paper-warm);
    border-right: 0.5px solid rgba(30,30,28,0.14);
    border-bottom: 0.5px solid rgba(30,30,28,0.14);
    transform: skewX(-14deg);
    border-radius: 0 0 8px 0;
  }
  .c13 .head {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -58%);
    width: 94px; height: 94px;
    border-radius: 22px;
    background: var(--ink);
    box-shadow: 0 4px 10px rgba(30,30,28,0.22);
  }
  .c13 .head::after {
    content: "T";
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: var(--font-serif);
    font-size: 34px; color: var(--accent-ink);
    line-height: 1; transform: translateY(-2px);
    font-style: italic;
  }
  .c13 .antenna {
    position: absolute;
    left: 50%;
    top: calc(50% - 88px);
    width: 2px; height: 18px;
    background: var(--ink);
    transform: translateX(-50%);
  }
  .c13 .antenna::after {
    content: "";
    position: absolute;
    top: -5px; left: 50%;
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--rec-red);
    transform: translateX(-50%);
    box-shadow: 0 0 0 3px rgba(194,74,62,0.18);
  }
  .c13 .eyes {
    position: absolute;
    inset: 32px 0 0 0;
    display: flex; justify-content: center; gap: 16px;
  }
  .c13 .eyes span {
    width: 10px; height: 10px; border-radius: 999px;
    background: var(--paper);
  }
  .c13 .mouth {
    position: absolute;
    left: 50%; bottom: 18px;
    transform: translateX(-50%);
    width: 30px; height: 4px; border-radius: 2px;
    background: var(--accent-ink);
  }

  /* ─── 14 · Laptop with bot on screen ─── */
  /* A simplified MacBook. On its navy screen lives a tiny 8-bit style
     bot head. Reads immediately as "transcriber app for Mac." */
  .c14 { background: radial-gradient(120% 80% at 50% 10%, #FFFEF9 0%, var(--paper-warm) 60%, var(--paper-soft) 100%); }
  .c14 .lid {
    position: absolute;
    left: 50%; top: 44%;
    transform: translate(-50%, -50%);
    width: 164px; height: 108px;
    background: var(--ink);
    border-radius: 12px 12px 4px 4px;
    box-shadow: 0 8px 16px rgba(30,30,28,0.22);
  }
  .c14 .screen {
    position: absolute;
    inset: 8px;
    border-radius: 6px;
    background: var(--accent-ink);
    overflow: hidden;
  }
  .c14 .base {
    position: absolute;
    left: 50%; top: calc(44% + 60px);
    transform: translateX(-50%);
    width: 200px; height: 10px;
    background: var(--ink);
    border-radius: 0 0 10px 10px;
    box-shadow: 0 6px 12px rgba(30,30,28,0.18);
  }
  .c14 .base::after {
    content: "";
    position: absolute;
    left: 50%; top: 0;
    width: 52px; height: 3px;
    background: rgba(250,250,247,0.28);
    transform: translateX(-50%);
    border-radius: 0 0 6px 6px;
  }
  /* 8-bit bot face */
  .c14 .bot {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    display: grid;
    grid-template-columns: repeat(7, 8px);
    grid-template-rows: repeat(6, 8px);
    gap: 2px;
  }
  .c14 .bot span { background: transparent; }
  .c14 .bot span.on { background: var(--paper); border-radius: 1px; }
  .c14 .bot span.red { background: var(--rec-red); border-radius: 1px; }

  /* ─── 15 · Terminal window w/ ASCII bot ─── */
  /* Retro terminal card — a framed window with a monospaced ASCII bot
     face inside. Hacker-adjacent, dev-friendly. */
  .c15 { background: var(--paper); }
  .c15 .term {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 168px; height: 142px;
    background: var(--ink);
    border-radius: 12px;
    box-shadow: 0 10px 22px rgba(30,30,28,0.28);
    overflow: hidden;
  }
  .c15 .term .bar {
    height: 20px;
    background: #262623;
    display: flex; align-items: center; padding: 0 8px; gap: 5px;
    border-bottom: 0.5px solid rgba(255,255,255,0.06);
  }
  .c15 .term .bar span {
    width: 7px; height: 7px; border-radius: 999px;
    background: rgba(250,250,247,0.22);
  }
  .c15 .term .bar span.on { background: var(--live-green); box-shadow: 0 0 0 2px rgba(74,138,94,0.22); }
  .c15 .term .body {
    padding: 12px 14px;
    font-family: var(--font-mono);
    font-size: 16px;
    line-height: 1.15;
    color: var(--paper);
    white-space: pre;
    letter-spacing: 0.02em;
  }
  .c15 .term .body .accent { color: var(--accent-soft); }
  .c15 .term .body .dim    { color: rgba(250,250,247,0.55); }
  .c15 .cursor {
    display: inline-block;
    width: 9px; height: 14px;
    background: var(--paper);
    vertical-align: -2px;
    margin-left: 4px;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="assets/design-canvas.jsx"></script>

<script type="text/babel">
  // ── 04 · KEEPER ──
  function Concept04() {
    const pins = [34, 66, 98, 130, 162];
    return (
      <div className="sq c04">
        <div className="pins">
          {pins.map(v => <span key={`t${v}`} className="top"   style={{ left: v+'px' }} />)}
          {pins.map(v => <span key={`b${v}`} className="bot"   style={{ left: v+'px' }} />)}
          {pins.map(v => <span key={`l${v}`} className="left"  style={{ top:  v+'px' }} />)}
          {pins.map(v => <span key={`r${v}`} className="right" style={{ top:  v+'px' }} />)}
        </div>
        <div className="chip" />
        <div className="wave">
          {[10, 22, 34, 46, 34, 22, 10, 26, 40, 26, 12].map((h, i) =>
            <span key={i} style={{ height: h + 'px' }} />)}
        </div>
      </div>
    );
  }

  // ── 10 · KEEPER ──
  function Concept10() {
    return (
      <div className="sq c10">
        <div className="leads">
          <span className="l y1" /><span className="l y2" /><span className="l y3" /><span className="l y4" />
          <span className="r y1" /><span className="r y2" /><span className="r y3" /><span className="r y4" />
        </div>
        <div className="package" />
        <svg className="wave-svg" viewBox="0 0 140 80" fill="none" stroke="#2B4A7A" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
          <path d="M6 40 L18 40 L24 22 L32 58 L40 12 L48 68 L56 28 L64 52 L72 40 L86 40 L92 30 L100 50 L108 40 L134 40" />
        </svg>
      </div>
    );
  }

  // ── 12 · Mac Plus silhouette with bot face ──
  function Concept12() {
    return (
      <div className="sq c12">
        <div className="mac" />
        <div className="screen">
          <span className="eye l" />
          <span className="eye r" />
          <span className="smile" />
        </div>
      </div>
    );
  }

  // ── 13 · Speech-bubble bot ──
  function Concept13() {
    return (
      <div className="sq c13">
        <div className="bubble" />
        <div className="antenna" />
        <div className="head">
          <div className="eyes"><span /><span /></div>
          <div className="mouth" />
        </div>
      </div>
    );
  }

  // ── 14 · Laptop with 8-bit bot on screen ──
  function Concept14() {
    // 7x6 grid: 1=white pixel, 2=red (rec dot)
    // Row-major: eyes row = (2,2,0,0,0,2,2) etc.
    const px = [
      0,0,0,0,2,0,0,  // antenna tip (red)
      0,0,0,1,1,1,0,  // antenna + top
      1,1,1,1,1,1,1,  // bot brow
      1,0,1,0,1,0,1,  // eye row (with gap eyes)
      1,1,1,1,1,1,1,  // mouth band
      0,1,1,0,1,1,0,  // smile
    ];
    return (
      <div className="sq c14">
        <div className="lid">
          <div className="screen" />
        </div>
        <div className="bot">
          {px.map((v, i) =>
            <span key={i} className={v === 2 ? 'red' : v === 1 ? 'on' : ''} />
          )}
        </div>
        <div className="base" />
      </div>
    );
  }

  // ── 15 · Terminal window with ASCII bot ──
  function Concept15() {
    return (
      <div className="sq c15">
        <div className="term">
          <div className="bar"><span /><span /><span className="on" /></div>
          <div className="body">
{` `}<span className="dim">[·]</span>{` `}<span className="accent">/ \</span>{`\n`}
{`  `}<span className="accent">[o_o]</span>{`\n`}
{` `}<span className="dim">/</span>{`|`}<span className="accent">T</span>{`|`}<span className="dim">\\</span>{`\n`}
{`  `}<span className="dim">d b</span>
            <span className="cursor" />
          </div>
        </div>
      </div>
    );
  }

  const CONCEPTS = [
    { id: 'chip',    title: '04 · On-device Chip ★',    sub: 'KEEPER · silicon with a waveform in the die', Render: Concept04 },
    { id: 'package', title: '10 · Signal Through Silicon ★', sub: 'KEEPER · top-down chip with a waveform trace', Render: Concept10 },
    { id: 'macplus', title: '12 · Friendly Mac',        sub: 'Classic Mac silhouette, face on the screen', Render: Concept12 },
    { id: 'bubble',  title: '13 · Speech-bubble Bot',   sub: 'Round bot with antenna, inside a paper bubble', Render: Concept13 },
    { id: 'laptop',  title: '14 · Bot on Laptop',       sub: 'MacBook, 8-bit bot face on a navy screen', Render: Concept14 },
    { id: 'term',    title: '15 · ASCII in Terminal',   sub: 'Dark terminal window, monospace ASCII bot', Render: Concept15 },
  ];

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="icons-v3"
          title="App Icon · v3 · Bot in the Machine"
          subtitle="04 & 10 kept as anchors. Four bot-in-computer directions."
        >
          {CONCEPTS.map(c => (
            <DCArtboard key={c.id} id={c.id} label={c.title} width={320} height={340}>
              <div style={{ width: '100%', height: '100%', display: 'grid', placeItems: 'center' }}>
                <c.Render />
              </div>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
